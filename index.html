<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Goëlo Moteur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.container{
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1a1a1a;
  border-radius:10px;
  padding:15px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.card h3{
  cursor:pointer;
}

button{
  background:red;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.cart{
  position:fixed;
  top:10px;
  right:10px;
  background:#000;
  padding:10px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
Goëlo Moteur
</header>

<div class="cart">
Panier : <span id="count">0</span>
</div>

<div class="container">
<h2>Nos produits</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 onclick="openProduct('Couvercle PHBG')">Couvercle PHBG</h3>
<p>22,5€</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 onclick="openProduct('Platine Lambretta')">Platine Lambretta</h3>
<p>26€</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 onclick="openProduct('Couvercle SHA')">Couvercle SHA</h3>
<p>22,5€</p>
<button onclick="addCart()">Ajouter</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3 onclick="openProduct('Cuve SHA')">Cuve SHA</h3>
<p>26€</p>
<button onclick="addCart()">Ajouter</button>
</div>

</div>
</div>

<script>

let count=0;

function addCart(){
  count++;
  document.getElementById("count").innerText=count;
}

function openProduct(name){
  alert("Produit : " + name);
}

</script>

</body>
</html>
